<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - KLSystem</title>
    <link rel="stylesheet" href="../css/sidebar.css">
    <link rel="stylesheet" href="../css/perfil.css">
</head>

<body>
    <aside class="sidebar">
        <div class="logo">
            <h1>KL<span>System</span></h1>
        </div>
        <nav>
            <ul>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="imoveis.html">Imóveis</a></li>
                <li><a href="inquilinos.html">Inquilinos</a></li>
                <li><a href="#">Contratos</a></li>
                <li><a href="pagamentos.html">Pagamentos</a></li>
                <li class="profile active"><a href="perfil.html">Meu Perfil</a></li>
                <li class="logout"><a href="index.html">Sair</a></li>
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <h2>Meu Perfil</h2>
        </header>

        <div class="dashboard-scroll">
            <section class="form-section profile-container">
                <h3>Dados Pessoais</h3>
                <form action="#">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="nome">Nome Completo</label>
                            <input type="text" id="nome" value="Administrador" placeholder="Seu Nome">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="email">E-mail</label>
                            <input type="email" id="email" value="admin@klsystem.com"
                                placeholder="seuemail@exemplo.com">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="senha">Nova Senha</label>
                            <input type="password" id="senha" placeholder="******">
                        </div>
                        <div class="form-group">
                            <label for="senhaConfirm">Confirmar Senha</label>
                            <input type="password" id="senhaConfirm" placeholder="******">
                        </div>
                    </div>
                    <button type="submit" class="btn">Atualizar Perfil</button>
                    <button type="reset" class="btn btn-danger">Cancelar</button>
                </form>
            </section>
        </div>
    </main>
</body>

</html>
