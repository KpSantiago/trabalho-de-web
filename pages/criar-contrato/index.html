<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Crie um novo contrato de locação no KLSystem. Preencha os dados do inquilino, imóvel, condições do contrato e prazo de forma simples e rápida.">
    <meta name="keywords" content="criar contrato, novo contrato, locação, aluguel, KLSystem, gestão imobiliária, formulário">
    <meta name="author" content="KLSystem">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="Criar Novo Contrato - KLSystem">
    <meta property="og:description" content="Crie um novo contrato de locação de forma simples e rápida no KLSystem.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Criar Novo Contrato - KLSystem">
    <meta name="twitter:description" content="Crie um novo contrato de locação de forma simples e rápida no KLSystem.">
    <link rel="canonical" href="https://klsystem.com/contratos/novo">
    <title>Criar Novo Contrato - KLSystem</title>
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/sidebar.css">
    <link rel="stylesheet" href="../../css/buttons.css">
    <link rel="stylesheet" href="../../css/cards.css">
    <link rel="stylesheet" href="../../css/forms.css">
    <link rel="stylesheet" href="../../css/badge.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <input type="checkbox" class="sidebar-checkbox" id="sidebar-toggle">
    <label for="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle sidebar">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
    </label>
    <div class="sidebar-overlay"></div>

    <aside class="sidebar">
        <div class="logo">
            <h1>KL<span>System</span></h1>
        </div>
        <nav>
            <ul>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="imoveis.html">Imóveis</a></li>
                <li><a href="inquilinos.html">Inquilinos</a></li>
                <li><a href="../contratos/">Contratos</a></li>
                <li><a href="../pagamentos/">Pagamentos</a></li>
                <li class="profile"><a href="perfil.html">Meu Perfil</a></li>
                <li class="logout"><a href="../auth/">Sair</a></li>
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <h2>Criar Contrato</h2>
            <div class="user-info">
                <span>Olá, Administrador</span>
            </div>
        </header>

        <div class="dashboard-scroll">
            <section class="dashboard-details">
                <div class="table-container">
                    <div class="table-header">
                        <a href="../contratos/" class="btn btn-back">← Voltar</a>
                        <h3>Novo Contrato</h3>
                    </div>

                    <form class="contract-form">
                        <div class="form-sections-grid">
                            <div class="form-section">
                                <h4>Dados do Inquilino</h4>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label for="inquilino">Inquilino</label>
                                        <select id="inquilino">
                                            <option value="">Selecione o inquilino</option>
                                            <option value="1">João Silva</option>
                                            <option value="2">Maria Souza</option>
                                            <option value="3">Carlos Pereira</option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label for="cpf">CPF</label>
                                        <input type="text" id="cpf" placeholder="000.000.000-00" readonly>
                                    </div>
                                </div>
                            </div>

                            <div class="form-section">
                                <h4>Dados do Imóvel</h4>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label for="imovel">Imóvel</label>
                                        <select id="imovel">
                                            <option value="">Selecione o imóvel</option>
                                            <option value="1">Apto 402 - Centro</option>
                                            <option value="2">Casa 12 - Zona Sul</option>
                                            <option value="3">Apto 101 - Norte</option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label for="endereco">Endereço</label>
                                        <input type="text" id="endereco" placeholder="Endereço do imóvel" readonly>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="form-section">
                            <h4>Condições do Contrato</h4>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="valorAluguel">Valor Aluguel</label>
                                    <input type="text" id="valorAluguel" placeholder="R$ 0,00">
                                </div>
                                <div class="form-group">
                                    <label for="valorCondominio">Condomínio</label>
                                    <input type="text" id="valorCondominio" placeholder="R$ 0,00">
                                </div>
                                <div class="form-group">
                                    <label for="valorIptu">IPTU</label>
                                    <input type="text" id="valorIptu" placeholder="R$ 0,00">
                                </div>
                                <div class="form-group">
                                    <label for="indiceReajuste">Índice de Reajuste</label>
                                    <select id="indiceReajuste">
                                        <option value="IGP-M">IGP-M</option>
                                        <option value="IPCA">IPCA</option>
                                        <option value="INPC">INPC</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="diaVencimento">Dia Vencimento</label>
                                    <select id="diaVencimento">
                                        <option value="1">1</option>
                                        <option value="5">5</option>
                                        <option value="10">10</option>
                                        <option value="15" selected>15</option>
                                        <option value="20">20</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label for="multaRescisao">Multa Rescisão</label>
                                    <select id="multaRescisao">
                                        <option value="1">1 mês</option>
                                        <option value="2">2 meses</option>
                                        <option value="3" selected>3 meses</option>
                                        <option value="6">6 meses</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="form-section">
                            <h4>Prazo</h4>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="dataInicio">Data Início</label>
                                    <input type="date" id="dataInicio">
                                </div>
                                <div class="form-group">
                                    <label for="duracao">Duração</label>
                                    <select id="duracao">
                                        <option value="6">6 meses</option>
                                        <option value="12" selected>12 meses</option>
                                        <option value="18">18 meses</option>
                                        <option value="24">24 meses</option>
                                        <option value="36">36 meses</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label for="renovacao">Renovação Automática</label>
                                    <select id="renovacao">
                                        <option value="sim">Sim</option>
                                        <option value="nao" selected>Não</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary btn-confirm">Criar Contrato</button>
                            <a href="../contratos/" class="btn btn-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </section>
        </div>
    </main>
</body>
</html>
