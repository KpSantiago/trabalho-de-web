<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Meu Perfil - KLSystem">
    <title>Meu Perfil - KLSystem</title>
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/sidebar.css">
    <link rel="stylesheet" href="../../css/buttons.css">
    <link rel="stylesheet" href="../../css/forms.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <input type="checkbox" class="sidebar-checkbox" id="sidebar-toggle">
    <label for="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle sidebar">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
    </label>
    <div class="sidebar-overlay"></div>

    <aside class="sidebar">
        <div class="logo">
            <h1>KL<span>System</span></h1>
        </div>
        <nav>
            <ul>
                <li><a href="../dashboard/index.html">Dashboard</a></li>
                <li><a href="../imoveis/index.html">Imóveis</a></li>
                <li><a href="../inquilinos/index.html">Inquilinos</a></li>
                <li><a href="../contratos/index.html">Contratos</a></li>
                <li><a href="../pagamentos/index.html">Pagamentos</a></li>
                <li class="profile active"><a href="../perfil/index.html">Meu Perfil</a></li>
                <li class="logout"><a href="../../index.html">Sair</a></li>
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <h2>Meu Perfil</h2>
            <div class="user-info">
                <span>Olá, Administrador</span>
            </div>
        </header>

        <div class="dashboard-scroll">
            <section class="form-section profile-container">
                <h4>Dados Pessoais</h4>
                <form action="#">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="nome">Nome Completo</label>
                            <input type="text" id="nome" value="Administrador" placeholder="Seu Nome">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="email">E-mail</label>
                            <input type="email" id="email" value="admin@klsystem.com"
                                placeholder="seuemail@exemplo.com">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="senha">Nova Senha</label>
                            <input type="password" id="senha" placeholder="******">
                        </div>
                        <div class="form-group">
                            <label for="senhaConfirm">Confirmar Senha</label>
                            <input type="password" id="senhaConfirm" placeholder="******">
                        </div>
                    </div>
                    <div class="form-actions" style="margin-top: 1.5rem; display: flex; gap: 1rem;">
                        <button type="submit" class="btn btn-primary">Atualizar Perfil</button>
                        <button type="reset" class="btn btn-danger">Cancelar</button>
                    </div>
                </form>
            </section>
        </div>
    </main>
</body>

</html>
