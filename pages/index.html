<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/auth.css">
    <title>Sign in</title>
    <style>
        .form-container form div:nth-child(2) {
            margin-top: 2rem;
        }
    </style>
</head>

<body>
    <header>
    </header>
    <main>
        <div class="form-container">
            <form action="dashboard.html">
                <div>
                    <h1>Welcome back to <span>KLSystem</span>!</h1>
                    <p>Fill in the details below to log in your account.</p>
                </div>
                <div>
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="Enter your email">
                </div>
                <div>
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password">
                </div>
                <button type="submit">Sign in</button>
                <div class="hr"></div>
                <span class="change-page">Don't have an account? <a href="signup.html">Sign up</a></span>
            </form>
        </div>
        <div class="img"></div>
    </main>
</body>

</html>
