<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/auth.css">
    <title>Entrar</title>
    <style>
        .form-container form div:nth-child(2) {
            margin-top: 2rem;
        }
    </style>
</head>

<body>
    <header>
    </header>
    <main>
        <div class="form-container">
            <form action="dashboard.html">
                <div>
                    <h1>Bem-vindo de volta ao <span>KLSystem</span>!</h1>
                    <p>Preencha os detalhes abaixo para entrar na sua conta.</p>
                </div>
                <div>
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="Digite seu e-mail">
                </div>
                <div>
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="Digite sua senha">
                </div>
                <button type="submit">Entrar</button>
                <div class="hr"></div>
                <span class="change-page">Não tem uma conta? <a href="signup.html">Cadastre-se</a></span>
            </form>
        </div>
        <div class="img"></div>
    </main>
</body>

</html>
