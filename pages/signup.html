<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/auth.css">
    <title>Cadastrar-se</title>
</head>

<body>
    <header>

    </header>
    <main>
        <div class="form-container">
            <form action="dashboard.html">
                <div>
                    <h1>Bem-vindo ao <span>KLSystem</span>!</h1>
                    <p>Preencha os detalhes abaixo para criar sua conta.</p>
                </div>
                <div>
                    <label for="username">Nome de usuário</label>
                    <input type="text" id="username" placeholder="Digite seu nome de usuário">
                </div>
                <div>
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="Digite seu e-mail">
                </div>
                <div>
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="Digite sua senha">
                </div>
                <button type="submit">Cadastrar-se</button>
                <div class="hr"></div>
                <span class="change-page">Já tem uma conta? <a href="index.html">Entrar</a></span>
            </form>
        </div>
        <div class="img"></div>
    </main>
</body>

</html>
